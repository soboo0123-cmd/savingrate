name: Daily Rate Crawler

on:
  schedule:
    - cron: "0 19 * * *"  # 매일 한국시간 오전 8시 55분쯤 실행 (UTC 23:15)
  workflow_dispatch:      # 수동 실행 버튼
    inputs:
      force_email:
        description: '금리 변동과 상관없이 강제 메일 발송 테스트 (true/false)'
        required: true
        default: 'false'

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    
    # Node.js 24 환경을 명시적으로 사용하도록 설정
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 저장소 가져오기
      uses: actions/checkout@v5 # 최신 버전으로 업데이트
      
    - name: 파이썬 세팅
      uses: actions/setup-python@v6 # 최신 버전으로 업데이트
      with:
        python-version: '3.12'
        
    - name: 패키지 및 브라우저 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        
    - name: 크롤러 실행
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        FORCE_EMAIL: "${{ github.event.inputs.force_email || 'false' }}" 
      run: python crawler2.py

    - name: 결과 파일 자동 커밋
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add rate_data.json
        # 변경사항이 있을 때만 커밋 및 푸시
        if ! git diff --cached --quiet; then
          git commit -m "데이터 업데이트: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "변경 사항이 없어 커밋을 건너뜁니다."
        fi
